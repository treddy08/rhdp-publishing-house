# RHDP Publishing House — Project Manifest
# This file is the source of truth for project state.
# The orchestrator reads and updates it every session.

project:
  name: ""          # Project name (e.g., "Getting Started with OpenShift")
  id: ""            # Short identifier (e.g., "ocp-getting-started")
  created: ""       # ISO 8601 date (YYYY-MM-DD)
  owner: ""         # GitHub username of project owner
  type: ""          # workshop | demo
  autonomy: supervised  # supervised | semi | full

lifecycle:
  current_phase: intake       # DEPRECATED — use individual phase statuses instead
  phases:
    intake:
      status: pending       # pending | in_progress | completed | skipped
      completed_at: null
      assignees: []          # GitHub usernames working on this phase
      artifacts: []
    vetting:
      status: pending
      completed_at: null
      assignees: []
      result: null           # approved | revise | rejected
      rcars_response: null
    spec_refinement:
      status: pending
      completed_at: null
      assignees: []
      artifacts: []
    approval:
      status: pending
      approved_by: null
      completed_at: null
    writing:
      status: pending
      assignees: []
      modules: []            # Populated during intake
      # Example module entry:
      # - id: "module-01"
      #   title: "Module 1: Overview"
      #   status: pending    # pending | in_progress | drafted | approved
      #   content_path: null
      #   review_file: null
    editing:
      status: pending
      completed_at: null
      assignees: []
      artifacts: []
    automation:
      status: pending
      assignees: []
      needs_automation: null  # true | false — asked during intake
      catalog_path: null      # AgnosticV catalog path
      agv_repo: null          # AgnosticV git repo
      agv_branch: null        # AgnosticV branch
      substeps:
        catalog_item: pending       # AgnosticV catalog configuration
        requirements: pending       # Automation requirements (reviewable scope document)
        automation_code: pending    # Ansible collection or GitOps repo
        testing: pending            # Deploy and verify automation works
        e2e_checks: deferred        # End-to-end validation (future)
      automation_files: []    # List of automation artifact paths in this repo
    code_security_review:            # Code review (automation) + security review (content & automation)
      status: pending
      completed_at: null
      assignees: []
      artifacts: []
    final_review:
      status: pending
      completed_at: null
      assignees: []
      artifacts: []
    ready_for_publishing:
      status: pending
      completed_at: null

integrations:
  rcars_api: null            # URL to RCARS REST API (e.g., https://rcars.apps.example.com/api/v1)
  showroom_repo: null        # URL to public Showroom repo (set when content moves)
  automation_repo: null      # URL to automation repo (set when created)
