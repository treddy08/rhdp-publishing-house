site_name: RHDP Publishing House
site_description: AI-powered content lifecycle management for Red Hat Demo Platform
site_author: Red Hat Demo Platform Team
repo_url: https://github.com/rhpds/rhdp-publishing-house
repo_name: rhpds/rhdp-publishing-house
site_url: https://rhpds.github.io/rhdp-publishing-house/

docs_dir: docs
site_dir: site
exclude_docs: |
  superpowers/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font: false
  features:
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/publishing-house.css

nav:
  - Home: index.md
  - Overview:
    - Executive Summary: executive-summary.md
    - How It Works: how-it-works.md
    - Getting Started: getting-started.md
  - Architecture:
    - Portal: architecture/portal.md
    - RCARS Integration: architecture/rcars-integration.md
    - Express Mode: architecture/express-mode-overview.md
  - Proposed:
    - Jira Integration: architecture/jira-integration-overview.md
    - Hosted Workspace: architecture/hosted-workspace-overview.md
  - User Guides:
    - Claude Code Setup: user/claude-code-setup.md
  - Admin Guides:
    - Portal Deployment: admin/portal-deployment.md
    - MCP Auth: admin/mcp-auth.md
    - RCARS Service Auth: admin/rcars-service-auth.md
    - Common Rules: admin/PH-COMMON-RULES.md
  - API Reference:
    - MCP Tools: api/mcp-tools.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
