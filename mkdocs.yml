site_name: RHDP Publishing House
site_description: AI-powered content lifecycle management for Red Hat Demo Platform
site_author: Red Hat Demo Platform Team
repo_url: https://github.com/rhpds/rhdp-publishing-house
repo_name: rhpds/rhdp-publishing-house
site_url: https://rhpds.github.io/rhdp-publishing-house/

docs_dir: docs
site_dir: site
exclude_docs: |
  superpowers/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font: false
  features:
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/publishing-house.css

nav:
  - Home: index.md
  - Overview: overview.md
  - Architecture:
    - System Design: architecture/system-design.md
    - Central Backend: architecture/central.md
    - Skills System: architecture/skills.md
    - Lifecycle & Phases: architecture/lifecycle-phases.md
    - RCARS Integration: architecture/rcars-integration.md
    - Jira Integration: architecture/jira-integration.md
  - User Guides:
    - Getting Started: user/getting-started.md
    - Deployment Modes: user/deployment-modes.md
  - Admin Guides:
    - Deployment: admin/deployment.md
    - MCP Authentication: admin/mcp-auth.md
    - Operations: admin/operations.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
