---
apiVersion: v1
kind: Namespace
metadata:
  name: ph-provisioner
  labels:
    app.kubernetes.io/name: publishing-house
    app.kubernetes.io/component: workspace-provisioner

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workspace-provisioner
  namespace: ph-provisioner

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workspace-provisioner
rules:
  # Create namespaces for workspaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list"]

  # Manage DevWorkspace CRs
  - apiGroups: ["workspace.devfile.io"]
    resources: ["devworkspaces"]
    verbs: ["create", "get", "list", "delete", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workspace-provisioner
subjects:
  - kind: ServiceAccount
    name: workspace-provisioner
    namespace: ph-provisioner
roleRef:
  kind: ClusterRole
  name: workspace-provisioner
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-credentials
  namespace: ph-provisioner
type: Opaque
stringData:
  master-key: "REPLACE_WITH_YOUR_LITELLM_MASTER_KEY"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-provisioner
  namespace: ph-provisioner
  labels:
    app: workspace-provisioner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workspace-provisioner
  template:
    metadata:
      labels:
        app: workspace-provisioner
    spec:
      serviceAccountName: workspace-provisioner
      containers:
        - name: provisioner
          image: quay.io/rhpds/ph-workspace-provisioner:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LITELLM_URL
              value: "https://maas-rhdp.apps.maas.redhatworkshops.io"
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: master-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: workspace-provisioner
  namespace: ph-provisioner
spec:
  selector:
    app: workspace-provisioner
  ports:
    - port: 8000
      targetPort: 8000
      name: http

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: workspace-provisioner
  namespace: ph-provisioner
spec:
  to:
    kind: Service
    name: workspace-provisioner
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
